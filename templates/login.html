<!DOCTYPE html>
<html>
<head>
<title>CyberGuard Login</title>

<link rel="stylesheet" href="/static/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white d-flex justify-content-center align-items-center vh-100">

<form action="/login" method="POST" class="bg-secondary p-4 rounded shadow">

    <h3 class="text-center">🛡️ CyberGuard</h3>

    <input class="form-control my-3" name="username" placeholder="Username" required>

    <input class="form-control my-3" name="password" type="password" placeholder="Password" required>

    <button class="btn btn-danger w-100">Login</button>

</form>

</body>
</html>
